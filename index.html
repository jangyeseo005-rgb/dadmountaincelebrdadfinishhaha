<!DOCTYPE html><html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>백대명산 완등 축하</title><!-- 폭죽 라이브러리 --><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script><style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:"Pretendard", "Apple SD Gothic Neo", sans-serif;
    background:linear-gradient(180deg,#0f172a,#1e293b,#334155);
    color:white;
    overflow-x:hidden;
}

.container{
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:40px 5px 0;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:28px;
    padding:10px 12px;
    margin-bottom:1000px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    animation:slideUp 0.8s ease both;
}

.card:nth-child(2){animation-delay:0.1s;}
.card:nth-child(3){animation-delay:0.2s;}
.card:nth-child(4){animation-delay:0.3s;}
.card:nth-child(5){animation-delay:0.4s;}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.hero{
    text-align:center;
    padding-top:5px;
    padding-bottom:5px;
}

.hero h1{
    font-size:2.2rem;
    line-height:1.2;
    font-weight:900;
    margin:0;
    color:#fde68a;
    text-shadow:0 0 12px rgba(253,230,138,0.8);
}

.hero p{
    margin-top:12px;
    font-size:1rem;
    color:#e2e8f0;
}

.medal{
    width:75px;
    height:75px;
    margin:0 auto 14px;
    display:block;
    filter:drop-shadow(0 10px 18px rgba(0,0,0,0.35));
}

.section-title{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:1.05rem;
    font-weight:700;
    margin-bottom:14px;
    color:#f8fafc;
}

.date-box{
    text-align:center;
    padding:18px 16px;
    border-radius:20px;
    background:linear-gradient(135deg,rgba(253,230,138,0.18),rgba(251,191,36,0.12));
    border:1px solid rgba(253,230,138,0.28);
}

.date{
    font-size:1.5rem;
    font-weight:800;
    color:#fde68a;
    letter-spacing:1px;
    animation:glow 2s infinite alternate;
}

.date-label{
    margin-top:6px;
    color:#fef3c7;
    font-size:0.95rem;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #facc15,0 0 20px #fbbf24;
    }
    to{
        text-shadow:0 0 18px #fde047,0 0 32px #f59e0b;
    }
}

.progress-wrap{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.progress-label{
    font-weight:700;
    color:#e2e8f0;
}

.progress-value{
    font-weight:800;
    color:#fde68a;
}

.progress-bar{
    width:100%;
    height:20px;
    background:rgba(255,255,255,0.12);
    border-radius:999px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
}

.progress-fill{
    width:100%;
    height:100%;
    background:linear-gradient(90deg,#22c55e,#84cc16,#fde047);
    box-shadow:0 0 18px rgba(250,204,21,0.45);
}

.complete{
    margin-top:14px;
    text-align:center;
    font-size:1.35rem;
    font-weight:900;
    color:#fde68a;
    letter-spacing:1px;
}

.btn{
    width:100%;
    border:none;
    border-radius:18px;
    padding:12px 15px;
    font-size:1.05rem;
    font-weight:800;
    cursor:pointer;
    background:linear-gradient(135deg,#f59e0b,#ef4444);
    color:white;
    box-shadow:0 10px 24px rgba(239,68,68,0.35);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
}

.btn:active{
    transform:scale(0.98);
    box-shadow:0 6px 16px rgba(239,68,68,0.3);
}

.footer{
    text-align:center;
    color:#cbd5e1;
    font-size:0.95rem;
    margin-top:8px;
}
</style></head><body><div class="container"><!-- 카드 1 : 메인 축하 -->
<section class="card hero">
    <h1>
🎉 백대명산<br>
완등을<br>
축하합니다! 🎉
    </h1>
    
</section>

<!-- 카드 2 : 완등 메달 -->
<section class="card">
    <div class="section-title">🏆 완등 메달</div>

    <!-- 금메달 SVG -->
    <svg class="medal" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FDE68A"/>
                <stop offset="50%" stop-color="#FBBF24"/>
                <stop offset="100%" stop-color="#B45309"/>
            </linearGradient>
        </defs>
        <polygon points="60,20 90,20 80,80 50,80" fill="#2563EB"/>
        <polygon points="110,20 140,20 150,80 120,80" fill="#DC2626"/>
        <circle cx="100" cy="115" r="58" fill="url(#gold)" stroke="#FCD34D" stroke-width="6"/>
        <circle cx="100" cy="115" r="42" fill="none" stroke="#FEF3C7" stroke-width="4" opacity="0.9"/>
        <text x="100" y="123" text-anchor="middle" font-size="24" font-weight="900" fill="#78350F">100</text>
    </svg>

    <div style="text-align:center;font-size:1.08rem;font-weight:800;">백대명산 완등 메달</div>
</section>

<!-- 카드 3 : 완등 날짜 -->
<section class="card">
    <div class="section-title">✨ 완등 날짜</div>
    <div class="date-box">
        <div class="date">2026.07.12</div>
        <div class="date-label">빛나는 완등의 순간</div>
    </div>
</section>

<!-- 카드 4 : 100/100 COMPLETE -->
<section class="card">
    <div class="section-title">📊 도전 진행률</div>

    <div class="progress-wrap">
        <div class="progress-label">백대명산</div>
        <div class="progress-value">100 / 100</div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>

    <div class="complete">🏔️ 100 / 100 COMPLETE 🏔️</div>
</section>

<!-- 카드 5 : 버튼 -->
<section class="card">
    <div class="section-title">👏 다시 축하하기</div>
    <button class="btn" onclick="celebrate()">👏 박수 + 🎆 폭죽 다시 터뜨리기</button>
</section>

</div><script>
function celebrate(){
    // 폭죽
    var duration = 3000;
    var end = Date.now() + duration;

    (function frame() {
      confetti({
        particleCount:6,
        angle:60,
        spread:70,
        origin:{x:0}
      });

      confetti({
        particleCount:6,
        angle:120,
        spread:70,
        origin:{x:1}
      });

      if (Date.now() < end) {
        requestAnimationFrame(frame);
      }
    }());

    // 박수 소리
    const audio = new Audio(
      "https://actions.google.com/sounds/v1/human_voices/applause.ogg"
    );
    audio.play();
}

// 페이지 들어오자마자 자동 축하
window.onload = function(){
    celebrate();
};
</script></body>
          </html>
